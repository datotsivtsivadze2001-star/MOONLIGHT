<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation | MOONLIGHT</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Times New Roman', serif;
            /* ფონზე დავაყენოთ ლამაზი საქორწილო სურათი */
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://images.unsplash.com/photo-1519741497674-611481863552?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .glass-container {
            background: rgba(255, 255, 255, 0.1); /* შუშის ეფექტი */
            backdrop-filter: blur(15px); /* დაბურვა */
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 50px 30px;
            width: 90%;
            max-width: 450px;
            text-align: center;
            color: white;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 2.8em;
            margin-bottom: 10px;
            letter-spacing: 2px;
            font-weight: 300;
        }

        .divider {
            width: 50px;
            height: 2px;
            background: #d4af37;
            margin: 20px auto;
        }

        p {
            font-size: 1.2em;
            margin: 15px 0;
            letter-spacing: 1px;
        }

        .date-box {
            font-size: 1.5em;
            border-top: 1px solid rgba(255, 255, 255, 0.3);
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            padding: 15px 0;
            margin: 25px 0;
            font-weight: bold;
        }

        .location {
            color: #d4af37;
            font-style: italic;
            margin-bottom: 30px;
        }

        .rsvp-btn {
            background: transparent;
            border: 1px solid white;
            color: white;
            padding: 12px 40px;
            text-decoration: none;
            font-size: 1em;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.4s;
            display: inline-block;
        }

        .rsvp-btn:hover {
            background: white;
            color: black;
        }

        footer {
            margin-top: 30px;
            font-size: 0.7em;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <div class="glass-container">
        <p>MOONLIGHT EVENTS PRESENTS</p>
        <h1>SAVE THE DATE</h1>
        <div class="divider"></div>
        
        <p>JOIN US TO CELEBRATE THE WEDDING OF</p>
        <h2 style="font-size: 2.2em; margin: 10px 0;">David & Nia</h2>
        
        <div class="date-box">
            AUGUST | 22 | 2026
        </div>
        
        <p class="location">Mtatsminda Panorama, Tbilisi</p>
        
        <a href="#" class="rsvp-btn">Confirm Attendance</a>
        
        <footer>
            DESIGNED BY MOONLIGHT MANAGEMENT
        </footer>
    </div>

</body>
</html>
